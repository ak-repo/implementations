<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Search - Elasticsearch Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .highlight {
            background-color: #fef08a;
            font-weight: 600;
            padding: 0 2px;
            border-radius: 2px;
        }
        .autocomplete-item:hover {
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold text-gray-900">Blog Search</h1>
            <p class="text-gray-600 mt-2">Full-text search powered by Elasticsearch</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Create Blog Button -->
        <div class="flex justify-end mb-4">
            <button 
                id="createBlogBtn"
                class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition-colors font-medium flex items-center gap-2"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Create New Blog
            </button>
        </div>

        <!-- Search Section -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <!-- Search Input -->
            <div class="relative mb-4">
                <input 
                    type="text" 
                    id="searchInput"
                    placeholder="Search blogs..."
                    class="w-full px-4 py-3 text-lg border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    autocomplete="off"
                >
                <!-- Autocomplete Dropdown -->
                <div 
                    id="autocompleteDropdown"
                    class="absolute z-10 w-full mt-1 bg-white border border-gray-300 rounded-lg shadow-lg hidden max-h-60 overflow-y-auto"
                ></div>
            </div>

            <!-- Filters -->
            <div class="flex flex-wrap gap-4 mb-4">
                <div class="flex items-center">
                    <label for="authorFilter" class="text-sm font-medium text-gray-700 mr-2">Author:</label>
                    <input 
                        type="text" 
                        id="authorFilter"
                        placeholder="Filter by author"
                        class="px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                    >
                </div>
                <div class="flex items-center">
                    <label for="tagFilter" class="text-sm font-medium text-gray-700 mr-2">Tag:</label>
                    <input 
                        type="text" 
                        id="tagFilter"
                        placeholder="Filter by tag"
                        class="px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500"
                    >
                </div>
                <div class="flex items-center">
                    <label for="sortBy" class="text-sm font-medium text-gray-700 mr-2">Sort:</label>
                    <select id="sortBy" class="px-3 py-2 border border-gray-300 rounded-md focus:ring-2 focus:ring-blue-500">
                        <option value="relevance">Relevance</option>
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                    </select>
                </div>
            </div>

            <!-- Search Button -->
            <button 
                id="searchBtn"
                class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium"
            >
                Search
            </button>
        </div>

        <!-- Results Section -->
        <div id="resultsSection" class="hidden">
            <!-- Stats -->
            <div class="flex justify-between items-center mb-4">
                <p id="resultsStats" class="text-gray-600"></p>
                <span id="pageInfo" class="text-sm text-gray-500"></span>
            </div>

            <!-- Results List -->
            <div id="resultsList" class="space-y-4">
                <!-- Results will be inserted here -->
            </div>

            <!-- Pagination -->
            <div id="pagination" class="flex justify-center items-center gap-2 mt-8">
                <!-- Pagination buttons will be inserted here -->
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-12">
            <p class="text-gray-500 text-lg">Start typing to search for blogs...</p>
        </div>

        <!-- Loading State -->
        <div id="loadingState" class="hidden text-center py-12">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <p class="text-gray-600 mt-2">Searching...</p>
        </div>

        <!-- No Results -->
        <div id="noResults" class="hidden text-center py-12">
            <p class="text-gray-500 text-lg">No blogs found matching your search.</p>
            <p class="text-gray-400 mt-2">Try different keywords or filters.</p>
        </div>
    </main>

    <!-- Create Blog Modal -->
    <div id="createBlogModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex justify-between items-center">
                <h2 class="text-2xl font-bold text-gray-900">Create New Blog Post</h2>
                <button id="closeModalBtn" class="text-gray-400 hover:text-gray-600 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <form id="createBlogForm" class="p-6 space-y-6">
                <!-- Title -->
                <div>
                    <label for="blogTitle" class="block text-sm font-medium text-gray-700 mb-2">Title *</label>
                    <input 
                        type="text" 
                        id="blogTitle"
                        name="title"
                        required
                        maxlength="200"
                        placeholder="Enter blog title"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                    >
                    <p class="text-xs text-gray-500 mt-1"><span id="titleCharCount">0</span>/200 characters</p>
                </div>
                
                <!-- Content -->
                <div>
                    <label for="blogContent" class="block text-sm font-medium text-gray-700 mb-2">Content *</label>
                    <textarea 
                        id="blogContent"
                        name="content"
                        required
                        rows="8"
                        placeholder="Write your blog content here..."
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 resize-vertical"
                    ></textarea>
                </div>
                
                <!-- Author -->
                <div>
                    <label for="blogAuthor" class="block text-sm font-medium text-gray-700 mb-2">Author *</label>
                    <input 
                        type="text" 
                        id="blogAuthor"
                        name="author"
                        required
                        maxlength="100"
                        placeholder="Your name"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                    >
                </div>
                
                <!-- Tags -->
                <div>
                    <label for="blogTags" class="block text-sm font-medium text-gray-700 mb-2">Tags</label>
                    <input 
                        type="text" 
                        id="blogTags"
                        name="tags"
                        placeholder="Enter tags separated by commas (e.g., golang, backend, tutorial)"
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500"
                    >
                    <p class="text-xs text-gray-500 mt-1">Separate tags with commas</p>
                </div>
                
                <!-- Error Message -->
                <div id="formError" class="hidden bg-red-50 border border-red-200 rounded-lg p-4">
                    <p class="text-red-700 text-sm" id="errorText"></p>
                </div>
                
                <!-- Submit Buttons -->
                <div class="flex justify-end gap-3 pt-4 border-t border-gray-200">
                    <button 
                        type="button"
                        id="cancelBtn"
                        class="px-6 py-2 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors"
                    >
                        Cancel
                    </button>
                    <button 
                        type="submit"
                        id="submitBtn"
                        class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors font-medium flex items-center gap-2"
                    >
                        <span id="submitText">Create Blog</span>
                        <svg id="submitSpinner" class="hidden animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Success Toast -->
    <div id="successToast" class="fixed bottom-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
            </svg>
            <span id="toastMessage">Blog created successfully!</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
