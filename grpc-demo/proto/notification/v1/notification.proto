syntax = "proto3";

package notification.v1;

option go_package = "github.com/grpc-demo/proto/notification/v1;notificationv1";

import "google/protobuf/timestamp.proto";

message Notification {
  string id = 1;
  string order_id = 2;
  string customer_id = 3;
  string message = 4;
  NotificationType type = 5;
  google.protobuf.Timestamp timestamp = 6;
}

enum NotificationType {
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  NOTIFICATION_TYPE_EMAIL = 1;
  NOTIFICATION_TYPE_SMS = 2;
  NOTIFICATION_TYPE_PUSH = 3;
}

message SendNotificationRequest {
  string order_id = 1;
  string customer_id = 2;
  string message = 3;
  NotificationType type = 4;
}

message SendNotificationResponse {
  bool success = 1;
  string notification_id = 2;
}

message SubscribeRequest {
  string customer_id = 1;
}

message StatusUpdate {
  string order_id = 1;
  string status = 2;
  string message = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message TrackingUpdate {
  string order_id = 1;
  string event = 2;
  string location = 3;
  google.protobuf.Timestamp timestamp = 4;
}

service NotificationService {
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);
  rpc OrderStatusStream(SubscribeRequest) returns (stream StatusUpdate);
  rpc LiveOrderTracking(stream TrackingUpdate) returns (stream TrackingUpdate);
}
